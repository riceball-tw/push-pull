<!DOCTYPE html>
<html lang="en" data-webtui-theme="catppuccin">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Push Pull - WebAssembly</title>

    <!-- xterm.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

    <!-- Go WASM execution -->
    <script src="wasm_exec.js"></script>

    <!-- WebTUI – full library via CDN -->
    <style>
        @import 'https://cdn.jsdelivr.net/npm/@webtui/css@0.0.3/dist/full.css';
        @import 'https://cdn.jsdelivr.net/npm/@webtui/theme-catppuccin/dist/index.css';
    </style>

    <style>
        /* ── layout ────────────────────────────────── */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--background0);
            color: var(--foreground0);
            overflow: hidden;
        }

        /* outer page wrapper – gives us a centred column */
        #app {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 80vw;
            max-width: 900px;
            height: 100vh;
        }

        /* ── header bar (above the box) ────────────── */
        #page-header {
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2ch;
            box-sizing: border-box;
            /* shear the header so it sits flush on the box top border */
            transform: translateY(10%);
            z-index: 2;
        }

        #page-header h1 {
            font-size: 0.85rem;
            margin: 0;
            padding: 0 1ch;
            /* slight spacing so the ASCII border frames it nicely */
            letter-spacing: 0.05em;
        }

        #page-header h1[is-="badge"] {
            /* Inherit or override badge styles to blend with the header layout */
            line-height: 1.4;
            --badge-color: var(--background0);
            --badge-text: var(--foreground0);
            /* Ensure it covers the border */
            box-shadow: 0 0 0 2px var(--background0);
        }

        .github-link {
            display: flex;
            align-items: center;
            gap: 0.4ch;
            text-decoration: none;
            padding: 0 1.5ch;
            background: var(--background0);
            font-size: 0.8rem;
            color: var(--foreground2);
            /* Ensure it covers the border */
            box-shadow: 0 0 0 2px var(--background0);
            border-radius: 4px;
        }

        .github-link:hover {
            color: var(--foreground0);
        }

        .github-icon {
            width: 16px;
            height: 16px;
            fill: currentColor;
            flex-shrink: 0;
        }

        /* ── ASCII box wrapping the terminal ───────── */
        #terminal-box {
            position: relative;
            width: 100%;
            /* use webtui box utility – shear top so the header title overlaps */
            display: flex;
            flex-direction: column;
        }

        /* ── xterm container ────────────────────────── */
        #terminal-container {
            flex: 1 1 auto;
            height: 65vh;
            min-height: 400px;
            padding: 0.5rem;
            box-sizing: border-box;
            display: flex;
        }

        #terminal-container .xterm {
            flex: 1;
        }

        #terminal-container .xterm-screen {
            padding: 1rem;
            box-sizing: border-box;
        }

        /* ── mobile controls ─────────────────────────── */
        #mobile-controls {
            display: none;
            padding: 0.75rem 0.5rem;
            border-top: 1px solid var(--background3);
        }

        .control-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        /* override webtui button defaults for mobile touch targets */
        #mobile-controls [is-="button"] {
            justify-content: center;
            padding-block: 0.8rem;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            touch-action: manipulation;
        }

        .btn-undo  { color: var(--yellow,  #f9e2af); }
        .btn-pull  { color: var(--green,  #a6e3a1); }
        .btn-pull.active {
            background: var(--green, #a6e3a1);
            color: var(--background0);
        }

        /* ── xterm scrollbar ─────────────────────────── */
        .xterm-viewport::-webkit-scrollbar       { width: 6px; }
        .xterm-viewport::-webkit-scrollbar-track { background: transparent; }
        .xterm-viewport::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
        }

        /* ── responsive ──────────────────────────────── */
        @media (max-width: 768px) {
            #app      { width: 95vw; }
            #terminal-container { height: 55vh; }
        }

        @media (max-width: 480px) {
            #app { width: 100vw; }
            #terminal-container { height: 50vh; min-height: 300px; }
            #mobile-controls { display: block; }
        }
    </style>
</head>
<body>
    <div id="app">

        <!-- ASCII box containing the terminal -->
        <div id="terminal-box" box-="square">
            <!-- Page header – sits above the ASCII box border -->
            <div id="page-header">
                <h1 is-="badge" cap-="slant-top slant-bottom">Push Pull — WebAssembly</h1>
                <a href="https://github.com/riceball-tw/push-pull" target="_blank" class="github-link" title="View on GitHub">
                    <svg class="github-icon" viewBox="0 0 16 16">
                        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                    </svg>
                    GitHub
                </a>
            </div>

            <div id="terminal-container"></div>
            <div id="mobile-controls">
                <div class="control-group">
                    <div is-="button" class="btn-undo" onclick="sendKey('u')">Undo</div>
                    <div is-="button" onclick="sendKey('k')">↑</div>
                    <div is-="button" class="btn-pull" id="pull-btn" onclick="togglePull()">Pull</div>
                    <div is-="button" onclick="sendKey('h')">←</div>
                    <div is-="button" onclick="sendKey('j')">↓</div>
                    <div is-="button" onclick="sendKey('l')">→</div>
                    <div style="visibility:hidden"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Setup xterm.js
        const term = new Terminal({
            theme: {
                background: 'var(--background0)',
                foreground: 'var(--foreground0)',
                cursor:     'var(--foreground0)',
                selectionBackground: 'var(--background2)',
                black:        'var(--background0)',
                red:          'var(--red, #f38ba8)',
                green:        'var(--green, #a6e3a1)',
                yellow:       'var(--yellow, #f9e2af)',
                blue:         'var(--blue, #89b4fa)',
                magenta:      'var(--mauve, #cba6f7)',
                cyan:         'var(--teal, #94e2d5)',
                white:        'var(--foreground0)',
                brightBlack:  'var(--background2)',
                brightRed:    'var(--red, #f38ba8)',
                brightGreen:  'var(--green, #a6e3a1)',
                brightYellow: 'var(--yellow, #f9e2af)',
                brightBlue:   'var(--blue, #89b4fa)',
                brightMagenta:'var(--mauve, #cba6f7)',
                brightCyan:   'var(--teal, #94e2d5)',
                brightWhite:  'var(--foreground0)'
            },
            fontFamily: '"JetBrains Mono", "Fira Code", "PingFang SC", "Microsoft YaHei", "Source Han Sans", monospace',
            fontSize: window.innerWidth < 480 ? 12 : 16,
            fontWeight: 400,
            lineHeight: 1.1,
            letterSpacing: 0,
            cursorBlink: true,
            cursorStyle: 'block'
        });

        // Dynamic font size on resize
        window.addEventListener('resize', () => {
            const newFontSize = window.innerWidth < 480 ? 12 : 16;
            if (term.options.fontSize !== newFontSize) {
                term.options.fontSize = newFontSize;
            }
            fitAddon.fit();
        });

        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);

        term.open(document.getElementById('terminal-container'));

        // Wait for fonts to load before fitting
        if (document.fonts) {
            document.fonts.ready.then(() => { fitAddon.fit(); });
        } else {
            setTimeout(() => fitAddon.fit(), 100);
        }

        // Make terminal available to Go side
        window.term = term;

        function togglePull() {
            const btn = document.getElementById('pull-btn');
            btn.classList.toggle('active');
        }

        function sendKey(key) {
            const pullActive = document.getElementById('pull-btn').classList.contains('active');
            let out = key;
            if (pullActive && ['h', 'j', 'k', 'l'].includes(key)) {
                out = key.toUpperCase();
            }
            if (window._wasmOnData) {
                window._wasmOnData(out);
            }
        }

        // Load and run the WebAssembly module
        if (!WebAssembly.instantiateStreaming) {
            // polyfill
            WebAssembly.instantiateStreaming = async (resp, importObject) => {
                const source = await (await resp).arrayBuffer();
                return await WebAssembly.instantiate(source, importObject);
            };
        }

        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
            term.write("\x1b[2J\x1b[H"); // Clear screen
            term.focus();
            go.run(result.instance);
        }).catch((err) => {
            console.error("Failed to load Wasm:", err);
            term.write("\r\n\x1b[31mFailed to load application.\x1b[0m\r\n");
        });
    </script>
</body>
</html>
