<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Push Pull - WebAssembly</title>
    <!-- xterm.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    
    <!-- Go WASM execution -->
    <script src="wasm_exec.js"></script>

    <style>
        :root {
            --bg-color: #1a1b26;
            --term-bg: #24283b;
            --header-bg: #1f2335;
            --text-main: #c0caf5;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --border-radius: 12px;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: radial-gradient(circle at center, #24283b 0%, #1a1b26 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        #terminal-wrapper {
            width: 80vw;
            height: 70vh;
            min-width: 600px;
            min-height: 450px;
            max-width: 900px;
            max-height: 600px;
            background: var(--term-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 20px 50px var(--shadow-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #terminal-header {
            background: var(--header-bg);
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            user-select: none;
            border-bottom: 1px solid rgba(0, 0, 0, 0.2);
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .control {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .close { background-color: #ff5f56; }
        .minimize { background-color: #ffbd2e; }
        .maximize { background-color: #27c93f; }

        #terminal-title {
            flex-grow: 1;
            text-align: center;
            font-size: 13px;
            color: #7982a9;
            font-weight: 500;
            margin-right: 52px; /* balance the space taken by controls */
        }

        #terminal-container {
            flex-grow: 1;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
        }

        /* Customize xterm scrollbar */
        .xterm-viewport::-webkit-scrollbar {
            width: 8px;
        }
        .xterm-viewport::-webkit-scrollbar-track {
            background: transparent;
        }
        .xterm-viewport::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        /* Center the actual terminal within its flex container */
        .xterm {
            padding: 2px;
        }
    </style>
</head>
<body>
    <div id="terminal-wrapper">
        <div id="terminal-header">
            <div class="window-controls">
                <div class="control close"></div>
                <div class="control minimize"></div>
                <div class="control maximize"></div>
            </div>
            <div id="terminal-title">Push Pull - WebAssembly</div>
        </div>
        <div id="terminal-container"></div>
    </div>
    <script>
        // Setup xterm.js
        const term = new Terminal({
            theme: {
                background: '#24283b',
                foreground: '#c0caf5',
                cursor: '#c0caf5',
                selectionBackground: 'rgba(255, 255, 255, 0.15)',
                black: '#1d202f',
                red: '#f7768e',
                green: '#9ece6a',
                yellow: '#e0af68',
                blue: '#7aa2f7',
                magenta: '#bb9af7',
                cyan: '#7dcfff',
                white: '#a9b1d6',
                brightBlack: '#414868',
                brightRed: '#f7768e',
                brightGreen: '#9ece6a',
                brightYellow: '#e0af68',
                brightBlue: '#7aa2f7',
                brightMagenta: '#bb9af7',
                brightCyan: '#7dcfff',
                brightWhite: '#c0caf5'
            },
            fontFamily: '"JetBrains Mono", "Fira Code", "PingFang SC", "Microsoft YaHei", "Source Han Sans", sans-serif, monospace',
            fontSize: 16,
            fontWeight: 400,
            lineHeight: 1.1,
            letterSpacing: 0,
            cursorBlink: true,
            cursorStyle: 'block'
        });
        
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        
        term.open(document.getElementById('terminal-container'));
        
        // Wait for fonts to load before fitting
        if (document.fonts) {
            document.fonts.ready.then(() => {
                fitAddon.fit();
            });
        } else {
            setTimeout(() => fitAddon.fit(), 100);
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
             fitAddon.fit();
        });

        // Make terminal available to Go side
        window.term = term;

        // Load and run the WebAssembly module
        if (!WebAssembly.instantiateStreaming) {
            // polyfill
            WebAssembly.instantiateStreaming = async (resp, importObject) => {
                const source = await (await resp).arrayBuffer();
                return await WebAssembly.instantiate(source, importObject);
            };
        }

        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
            term.write("\x1b[2J\x1b[H"); // Clear screen
            term.focus();
            go.run(result.instance);
        }).catch((err) => {
            console.error("Failed to load Wasm:", err);
            term.write("\r\n\x1b[31mFailed to load application.\x1b[0m\r\n");
        });
    </script>
</body>
</html>
